name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref,
              name: '财务数据拆分工具 ' + context.ref,
              draft: false,
              prerelease: false
            });
            return release.data.id;

  build-macos:
    runs-on: macos-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          pyinstaller \
            --name="财务数据拆分工具" \
            --windowed \
            --onefile \
            --clean \
            gui_app.py

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "财务数据拆分工具" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "dist/财务数据拆分工具-macOS.dmg" \
            "dist/财务数据拆分工具.app" || true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-app
          path: |
            dist/财务数据拆分工具.app
            dist/*.dmg
          if-no-files-found: ignore

      - name: Upload to Release (macOS)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            // Upload .app
            const appPath = 'dist/财务数据拆分工具.app';
            if (fs.existsSync(appPath)) {
              // Upload as zip since GitHub doesn't support .app directly
              const { execSync } = require('child_process');
              execSync(`cd dist && zip -r 财务数据拆分工具-macOS.app.zip 财务数据拆分工具.app`, { stdio: 'inherit' });

              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                name: '财务数据拆分工具-macOS.zip',
                data: fs.readFileSync('dist/财务数据拆分工具-macOS.app.zip')
              });
            }

            // Upload DMG - only if file exists
            const dmgFiles = fs.readdirSync('dist').filter(f => f.endsWith('.dmg'));
            for (const file of dmgFiles) {
              if (fs.existsSync(file)) {
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: ${{ needs.create-release.outputs.release_id }},
                  name: path.basename(file),
                  data: fs.readFileSync(file)
                });
              }
            }

  build-windows:
    runs-on: windows-latest
    needs: create-release
    strategy:
      matrix:
        python-version: ['3.8', '3.11']
        include:
          - python-version: '3.8'
            suffix: '-win7'
          - python-version: '3.11'
            suffix: '-win10+'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller `
            --name="财务数据拆分工具${{ matrix.suffix }}" `
            --windowed `
            --onefile `
            --clean `
            gui_app.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ matrix.python-version }}
          path: dist/*.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find all .exe files in dist directory
            const files = fs.readdirSync('dist').filter(f => f.endsWith('.exe'));
            console.log('Found files:', files);

            for (const file of files) {
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                name: path.basename(file),
                data: fs.readFileSync(file)
              });
            }